<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ethics Mastery — Study Guide</title>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/pretext@latest/dist/pretext.min.js"></script>
  <style>
    :root {
      --bg-primary: #1a1a1a;
      --bg-secondary: #242424;
      --text-primary: #f5f5f1;
      --text-secondary: #a8a8a0;
      --accent-gold: #d4af37;
      --accent-muted: #8b7355;
      --correct-green: #6b9e4e;
      --wrong-red: #a53a3a;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
    }

    body {
      font-family: 'Geist', sans-serif;
      background-color: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* Subtle background texture */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image:
        repeating-linear-gradient(
          0deg,
          rgba(0, 0, 0, 0.03) 0px,
          rgba(0, 0, 0, 0.03) 1px,
          transparent 1px,
          transparent 2px
        );
      pointer-events: none;
      z-index: 1;
    }

    #app {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
    }

    .container {
      width: 100%;
      max-width: 600px;
    }

    header {
      margin-bottom: 1.5rem;
      text-align: center;
      border-bottom: 1px solid var(--accent-muted);
      padding-bottom: 1rem;
    }

    h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -1px;
      margin-bottom: 0.25rem;
      color: var(--text-primary);
    }

    .subtitle {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.7rem;
      font-weight: 400;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text-secondary);
    }

    .stats {
      display: flex;
      justify-content: space-between;
      margin-top: 0.75rem;
      gap: 1.5rem;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.75rem;
    }

    .stat {
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
    }

    .stat-label {
      color: var(--text-secondary);
      font-weight: 400;
      font-size: 0.6rem;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .stat-value {
      font-size: 1rem;
      font-weight: 700;
      color: var(--accent-gold);
    }

    /* Progress bar */
    .progress-track {
      height: 2px;
      background: var(--bg-secondary);
      margin: 1rem 0;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background: var(--accent-gold);
      width: 0%;
    }

    /* Question card */
    .card {
      background: var(--bg-secondary);
      border: 1px solid var(--accent-muted);
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      position: relative;
      min-height: auto;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent-gold), transparent);
      opacity: 0.3;
    }

    .card-content {
      text-align: center;
      width: 100%;
    }

    .card-label {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.6rem;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text-secondary);
      margin-bottom: 0.6rem;
      display: block;
    }

    .card-text {
      font-size: 0.95rem;
      line-height: 1.5;
      color: var(--text-primary);
    }

    /* Options */
    .options {
      display: flex;
      flex-direction: column;
      gap: 0.7rem;
      margin-bottom: 1.5rem;
      overflow: hidden;
    }

    .opt-btn {
      background: var(--bg-secondary);
      border: 1px solid var(--accent-muted);
      color: var(--text-primary);
      padding: 0.75rem 1.2rem;
      font-family: 'Geist', sans-serif;
      font-size: 0.85rem;
      text-align: left;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      position: relative;
      overflow: hidden;
      line-height: 1.5;
    }

    .opt-btn::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      height: 100%;
      width: 3px;
      background: transparent;
      transition: background 0.25s;
    }

    .opt-btn:hover:not(:disabled) {
      background: rgba(212, 175, 55, 0.05);
      border-color: var(--accent-gold);
    }

    .opt-btn:hover:not(:disabled)::before {
      background: var(--accent-gold);
    }

    .opt-btn.correct {
      background: rgba(107, 158, 78, 0.1);
      border-color: var(--correct-green);
      color: var(--correct-green);
    }

    .opt-btn.correct::before {
      background: var(--correct-green);
    }

    .opt-btn.wrong {
      background: rgba(165, 58, 58, 0.1);
      border-color: var(--wrong-red);
      color: var(--wrong-red);
    }

    .opt-btn.wrong::before {
      background: var(--wrong-red);
    }

    .opt-btn:disabled {
      cursor: default;
    }

    /* Navigation */
    .nav {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 1rem;
    }

    .nav button {
      flex: 1;
      background: var(--bg-secondary);
      border: 1px solid var(--accent-muted);
      color: var(--text-primary);
      padding: 0.6rem 0.8rem;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .nav button:hover:not(:disabled) {
      background: rgba(212, 175, 55, 0.1);
      border-color: var(--accent-gold);
    }

    .nav button:disabled {
      opacity: 0.3;
      cursor: default;
    }

    /* Completion screen */
    .done-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(26, 26, 26, 0.95);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      backdrop-filter: blur(2px);
    }

    .done-card {
      background: var(--bg-secondary);
      border: 1px solid var(--accent-muted);
      padding: 2rem;
      max-width: 400px;
      text-align: center;
      position: relative;
    }

    .done-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent-gold), transparent);
      opacity: 0.3;
    }

    .done-card h2 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 0.8rem;
      letter-spacing: -1px;
    }

    .done-card p {
      font-size: 0.85rem;
      margin-bottom: 0.8rem;
      color: var(--text-secondary);
      line-height: 1.5;
    }

    .done-card .final-grade {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 2.2rem;
      font-weight: 700;
      color: var(--accent-gold);
      margin: 1rem 0;
    }

    .done-card button {
      background: var(--bg-primary);
      border: 1px solid var(--accent-muted);
      color: var(--text-primary);
      padding: 0.7rem 1.5rem;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .done-card button:hover {
      background: rgba(212, 175, 55, 0.1);
      border-color: var(--accent-gold);
    }

    /* Initial states set via gsap.set() in JS — not CSS — so dynamically created elements don't inherit them */

    .progress-track {
      transform-origin: left;
    }

    .done-overlay {
      opacity: 0;
    }

    /* Responsive */
    @media (max-width: 640px) {
      h1 {
        font-size: 1.4rem;
      }

      .card {
        padding: 1rem;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="container">
      <header>
        <h1>Ethics Mastery</h1>
        <p class="subtitle">Software Engineering Code of Ethics</p>
        <div class="stats">
          <div class="stat">
            <span class="stat-label">Current</span>
            <span class="stat-value" id="question-progress">1 / 41</span>
          </div>
          <div class="stat">
            <span class="stat-label">Grade</span>
            <span class="stat-value" id="current-grade">—</span>
          </div>
          <div class="stat">
            <span class="stat-label">Progress</span>
            <span class="stat-value" id="progress-pct">0%</span>
          </div>
          <div class="stat">
            <span class="stat-label">Time</span>
            <span class="stat-value" id="timer">0:00</span>
          </div>
        </div>
      </header>

      <div class="progress-track">
        <div class="progress-bar" id="progress"></div>
      </div>

      <div class="card" id="qcard">
        <div class="card-content">
          <span class="card-label">Question</span>
          <div class="card-text" id="qtext"></div>
        </div>
      </div>

      <div class="options" id="opts"></div>

      <div class="nav">
        <button id="prevBtn" onclick="move(-1)">← Previous</button>
        <button id="nextBtn" onclick="move(1)">Next →</button>
      </div>
    </div>
  </div>

  <script src="questions.js"></script>
  <script>
    // Quiz State
    let idx = 0;
    let correct = 0;
    let wrong = 0;
    let seconds = 0;
    let isAnimating = false;
    let isInitialized = false;
    const answered = new Array(questions.length).fill(null);

    // Timer
    function formatTime(sec) {
      const mins = Math.floor(sec / 60);
      const secs = sec % 60;
      return `${mins}:${secs.toString().padStart(2, '0')}`;
    }

    setInterval(() => {
      seconds++;
      document.getElementById('timer').textContent = formatTime(seconds);
    }, 1000);

    // Text measurement with Pretext
    function getCardHeight(text) {
      if (!window.Pretext) return null;

      const cardText = document.getElementById('qtext');
      const containerWidth = cardText.parentElement.offsetWidth - 40;

      try {
        const result = Pretext.prepare({
          text: text,
          fontFamily: 'Geist, sans-serif',
          fontSize: '0.95rem',
          lineHeight: '1.5',
          maxWidth: containerWidth,
          whiteSpace: 'normal'
        });
        return (result.height || 40) + 48; // content height + padding
      } catch (e) {
        return null;
      }
    }

    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    const quizQuestions = shuffle(
      questions.map(q => ({
        ...q,
        opts: shuffle([...q.opts])
      }))
    );

    function updateStats() {
      const total = correct + wrong;
      const grade = total > 0 ? Math.round((correct / total) * 100) : 0;
      const pct = Math.round((total / quizQuestions.length) * 100);

      document.getElementById('question-progress').textContent = `${idx + 1} / ${quizQuestions.length}`;
      document.getElementById('current-grade').textContent = grade > 0 ? `${grade}%` : '—';
      document.getElementById('progress-pct').textContent = `${pct}%`;
    }

    function renderContent(q) {
      // Pure DOM update, no animations
      document.getElementById('qtext').textContent = q.q;
      updateStats();

      const optsDiv = document.getElementById('opts');
      optsDiv.innerHTML = '';
      const wasAnswered = answered[idx];

      q.opts.forEach((opt) => {
        const btn = document.createElement('button');
        btn.className = 'opt-btn';
        btn.textContent = opt;

        if (wasAnswered !== null) {
          btn.disabled = true;
          if (opt === q.correct) btn.classList.add('correct');
          if (wasAnswered === opt && opt !== q.correct) btn.classList.add('wrong');
        } else {
          btn.onclick = () => selectAnswer(opt);
        }

        optsDiv.appendChild(btn);
      });

      document.getElementById('prevBtn').disabled = idx === 0;
      document.getElementById('nextBtn').textContent = idx === quizQuestions.length - 1 ? 'Finish' : 'Next →';
    }

    function introAnimation() {
      // Set initial hidden states here, not in CSS, so dynamically created elements don't inherit them
      gsap.set(['h1', '.subtitle'], { opacity: 0, y: -12 });
      gsap.set('.stat', { opacity: 0, y: 8 });
      gsap.set('.progress-track', { scaleX: 0 });
      gsap.set('.card', { opacity: 0, y: 16 });
      gsap.set('.opt-btn', { opacity: 0, y: 8 });
      gsap.set('.nav button', { opacity: 0 });

      const tl = gsap.timeline();

      tl.to(['h1', '.subtitle'], { opacity: 1, y: 0, duration: 0.4, ease: 'power2.out' }, 0)
        .to('.stat', { opacity: 1, y: 0, duration: 0.4, stagger: 0.08, ease: 'power2.out' }, 0.15)
        .to('.progress-track', { scaleX: 1, duration: 0.5, ease: 'power2.inOut' }, 0.3)
        .to('.card', { opacity: 1, y: 0, duration: 0.4, ease: 'power2.out' }, 0.4)
        .to('.opt-btn', { opacity: 1, y: 0, duration: 0.3, stagger: 0.05, ease: 'power2.out' }, 0.55)
        .to('.nav button', { opacity: 1, duration: 0.3, ease: 'power2.out' }, 0.7);

      return tl;
    }

    function transitionTo(dir) {
      if (isAnimating) return;
      isAnimating = true;

      const oldIdx = idx;
      idx = Math.max(0, Math.min(quizQuestions.length - 1, idx + dir));

      if (idx === oldIdx) {
        isAnimating = false;
        return;
      }

      const outPct = dir > 0 ? -115 : 115;
      const inPct  = dir > 0 ?  115 : -115;

      // Capture OLD element references now, before DOM changes
      const oldContent = document.querySelector('.card-content');
      const oldButtons = [...document.querySelectorAll('.opt-btn')];

      // Phase 1: slide old content out
      const outTl = gsap.timeline({
        onComplete() {
          // Swap DOM
          renderContent(quizQuestions[idx]);

          // Capture NEW element references after renderContent
          const newContent = document.querySelector('.card-content');
          const newButtons = [...document.querySelectorAll('.opt-btn')];

          // Position new content off-screen
          gsap.set(newContent, { xPercent: inPct, opacity: 1 });
          gsap.set(newButtons, { xPercent: inPct * 0.9, opacity: 0 });

          // Phase 2: slide new content in
          gsap.timeline({ onComplete: () => { isAnimating = false; } })
            .to(newContent, { xPercent: 0, duration: 0.28, ease: 'power2.out' })
            .to(newButtons, { xPercent: 0, opacity: 1, duration: 0.22, stagger: 0.04, ease: 'power2.out' }, '<0.05');
        }
      });

      outTl.to(oldContent, { xPercent: outPct, opacity: 0, duration: 0.22, ease: 'power2.in' }, 0);
      outTl.to(oldButtons, { xPercent: outPct * 0.9, opacity: 0, duration: 0.18, stagger: 0.03, ease: 'power2.in' }, 0.03);
    }

    function render() {
      const q = quizQuestions[idx];
      renderContent(q);

      if (!isInitialized) {
        isInitialized = true;
        introAnimation();
      }
    }

    function selectAnswer(opt) {
      const q = quizQuestions[idx];
      answered[idx] = opt;
      const isCorrect = opt === q.correct;

      if (isCorrect) correct++;
      else wrong++;

      // Update stats immediately
      updateStats();

      const total = correct + wrong;
      const pct = Math.round((total / quizQuestions.length) * 100);
      const grade = Math.round((correct / total) * 100);

      const tl = gsap.timeline();
      const buttons = document.querySelectorAll('.opt-btn');

      buttons.forEach((btn) => btn.disabled = true);

      if (isCorrect) {
        // Winning button pulses, others dim
        buttons.forEach((btn) => {
          if (btn.textContent === opt) {
            btn.classList.add('correct');
            tl.to(btn, { scale: 1.02, duration: 0.12, ease: 'back.out' }, 0);
            tl.to(btn, { scale: 1, duration: 0.12, ease: 'back.in' }, 0.12);
          } else {
            tl.to(btn, { opacity: 0.35, duration: 0.2 }, 0);
          }
        });

        // Progress bar elastic fill
        tl.to('#progress', { width: pct + '%', duration: 0.6, ease: 'elastic.out(1, 0.5)' }, 0.1);

        // Grade counts up to new value
        const prevGrade = total > 1 ? Math.round(((correct - 1) / (total - 1)) * 100) : 0;
        tl.to({ val: prevGrade }, { val: grade, duration: 0.5, ease: 'power2.out', onUpdate: function() {
          document.getElementById('current-grade').textContent = Math.round(this.targets()[0].val) + '%';
        }}, 0.1);
      } else {
        // Wrong button shakes, then correct is revealed
        buttons.forEach((btn) => {
          if (btn.textContent === opt) {
            btn.classList.add('wrong');
            tl.to(btn, { x: 5, duration: 0.05, repeat: 5, yoyo: true, ease: 'power2.inOut' }, 0);
          } else if (btn.textContent === q.correct) {
            btn.classList.add('correct');
            tl.fromTo(btn, { opacity: 0.2 }, { opacity: 1, duration: 0.4, ease: 'power2.out' }, 0.2);
          } else {
            tl.to(btn, { opacity: 0.35, duration: 0.2 }, 0);
          }
        });

        // Screen shake
        tl.to('#app', { x: 5, duration: 0.05, repeat: 5, yoyo: true, ease: 'power2.inOut' }, 0);
      }

      // Update nav state without rebuilding buttons
      tl.call(() => {
        document.getElementById('prevBtn').disabled = idx === 0;
        document.getElementById('nextBtn').textContent = idx === quizQuestions.length - 1 ? 'Finish' : 'Next →';
        if (idx === quizQuestions.length - 1) setTimeout(showDone, 700);
      });
    }

    function move(dir) {
      transitionTo(dir);
    }

    function showDone() {
      const grade = Math.round((correct / quizQuestions.length) * 100);
      let message = '';

      if (grade === 100) {
        message = 'Mastery achieved. Exemplary understanding of software engineering ethics.';
      } else if (grade >= 90) {
        message = 'Excellent performance. You demonstrate strong ethical understanding.';
      } else if (grade >= 80) {
        message = 'Very good. Solid grasp of the core principles.';
      } else if (grade >= 70) {
        message = 'Good. You understand the fundamental concepts.';
      } else if (grade >= 60) {
        message = 'Passing. Consider reviewing the material again.';
      } else {
        message = 'Study the material and try again.';
      }

      const overlay = document.createElement('div');
      overlay.className = 'done-overlay';
      overlay.innerHTML = `
        <div class="done-card">
          <h2 style="opacity: 0; transform: translateY(12px);">Assessment Complete</h2>
          <p style="opacity: 0; transform: translateY(12px);">${message}</p>
          <div class="final-grade" style="opacity: 0; transform: translateY(12px);">0%</div>
          <p style="opacity: 0; transform: translateY(12px); font-size: 0.85rem;">${correct} of ${quizQuestions.length} correct</p>
          <p style="opacity: 0; transform: translateY(12px); font-size: 0.8rem; color: var(--text-secondary); margin-top: 1rem;">Time: ${formatTime(seconds)}</p>
          <button style="opacity: 0; transform: scale(0.9);" onclick="location.reload()">Review Again</button>
        </div>
      `;
      document.body.appendChild(overlay);

      const tl = gsap.timeline();

      // Fade in overlay
      tl.to(overlay, { opacity: 1, duration: 0.25, ease: 'power2.inOut' }, 0);

      // Card slides up from bottom with bounce
      tl.fromTo(
        '.done-card',
        { y: 60, opacity: 0 },
        { y: 0, opacity: 1, duration: 0.5, ease: 'back.out(1.2)' },
        0.1
      );

      // Stagger inner elements
      const card = document.querySelector('.done-card');
      const elements = card.querySelectorAll('h2, p, .final-grade, button');

      tl.to(elements[0], { opacity: 1, y: 0, duration: 0.3, ease: 'cubic-bezier(0.25, 0.46, 0.45, 0.94)' }, 0.3);
      tl.to(elements[1], { opacity: 1, y: 0, duration: 0.3, ease: 'cubic-bezier(0.25, 0.46, 0.45, 0.94)' }, 0.4);

      // Grade counts up
      const gradeElement = elements[2];
      tl.to({ val: 0 }, {
        val: grade,
        duration: 0.8,
        ease: 'power2.out',
        onUpdate: function() {
          gradeElement.textContent = Math.round(this.targets()[0].val) + '%';
        }
      }, 0.45);
      tl.to(gradeElement, { opacity: 1, y: 0, duration: 0.3, ease: 'cubic-bezier(0.25, 0.46, 0.45, 0.94)' }, 0.45);

      tl.to(elements[3], { opacity: 1, y: 0, duration: 0.3, ease: 'cubic-bezier(0.25, 0.46, 0.45, 0.94)' }, 0.65);
      tl.to(elements[4], { opacity: 1, y: 0, duration: 0.3, ease: 'cubic-bezier(0.25, 0.46, 0.45, 0.94)' }, 0.75);
      tl.to(elements[5], { opacity: 1, scale: 1, duration: 0.3, ease: 'cubic-bezier(0.25, 0.46, 0.45, 0.94)' }, 0.85);
    }

    // Keyboard navigation
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight' || e.key === 'ArrowDown') move(1);
      if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') move(-1);
    });

    // Initialize
    render();
  </script>
</body>
</html>
